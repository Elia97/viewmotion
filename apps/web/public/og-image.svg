<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#0f0f18"/>
    </linearGradient>
    <linearGradient id="glow" cx="50%" cy="40%" r="40%" fx="50%" fy="40%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow blob -->
  <ellipse cx="600" cy="260" rx="350" ry="280" fill="url(#glow)" filter="url(#blur)"/>
  <!-- Border frame -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#27272a" stroke-width="2"/>
  <!-- Logo / brand -->
  <text x="600" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#71717a" text-anchor="middle" letter-spacing="4">VIEWMOTION</text>
  <!-- Main headline -->
  <text x="600" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">Reveal animations</text>
  <text x="600" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#textGrad)" text-anchor="middle" letter-spacing="-2">without the bloat.</text>
  <!-- Sub-copy -->
  <text x="600" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#71717a" text-anchor="middle">A single observer. Pure CSS. Zero dependencies. Under 2 KB.</text>
  <!-- Pills -->
  <rect x="290" y="490" width="180" height="44" rx="22" fill="#1e1e2e" stroke="#3f3f6e" stroke-width="1"/>
  <text x="380" y="517" font-family="ui-monospace, monospace" font-size="14" fill="#818cf8" text-anchor="middle">Framework-agnostic</text>
  <rect x="490" y="490" width="120" height="44" rx="22" fill="#1e1e2e" stroke="#3f3f6e" stroke-width="1"/>
  <text x="550" y="517" font-family="ui-monospace, monospace" font-size="14" fill="#818cf8" text-anchor="middle">SSR-safe</text>
  <rect x="630" y="490" width="140" height="44" rx="22" fill="#1e1e2e" stroke="#3f3f6e" stroke-width="1"/>
  <text x="700" y="517" font-family="ui-monospace, monospace" font-size="14" fill="#818cf8" text-anchor="middle">Tree-shakeable</text>
  <rect x="790" y="490" width="126" height="44" rx="22" fill="#1e1e2e" stroke="#3f3f6e" stroke-width="1"/>
  <text x="853" y="517" font-family="ui-monospace, monospace" font-size="14" fill="#818cf8" text-anchor="middle">v0.1.1 Stable</text>
</svg>